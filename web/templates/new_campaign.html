{% extends "base.html" %}

{% block title %}New Campaign — Airbnb Automate{% endblock %}

{% block content %}
<div class="form-page">
    <h1>➕ New Campaign</h1>

    <form method="POST" class="campaign-form">
        <div class="form-group">
            <label for="name">Campaign Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Goa Beach Stays">
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" required placeholder="e.g., Goa, India">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="checkin">Check-in Date</label>
                <input type="date" id="checkin" name="checkin" required>
            </div>
            <div class="form-group">
                <label for="checkout">Check-out Date</label>
                <input type="date" id="checkout" name="checkout" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="guests">Guests</label>
                <input type="number" id="guests" name="guests" value="2" min="1" max="16">
            </div>
            <div class="form-group">
                <label for="max_listings">Max Listings</label>
                <input type="number" id="max_listings" name="max_listings" value="20" min="1" max="100">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="min_price">Min Price ($/night)</label>
                <input type="number" id="min_price" name="min_price" value="0" min="0">
            </div>
            <div class="form-group">
                <label for="max_price">Max Price ($/night)</label>
                <input type="number" id="max_price" name="max_price" value="500" min="0">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Campaign</button>
            <a href="/campaigns" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
