# Airbnb Automate - Campaign Configuration
# Define your target locations, dates, and preferences

# Your content creator profile
creator:
  name: "Your Name"
  platform: "Instagram"
  handle: "@yourhandle"
  followers: 10000
  email: "your@email.com"
  portfolio_url: "https://yourportfolio.com"
  content_types:
    - "Professional photography"
    - "Short-form video (Reels/TikTok)"
    - "Blog post with SEO optimization"
    - "Google/Airbnb review"

# Target campaigns - define multiple location+date combos
campaigns:
  - name: "Goa Beach Stays"
    location: "Goa, India"
    checkin: "2026-06-01"
    checkout: "2026-06-07"
    guests: 2
    min_price: 30
    max_price: 150
    property_types:
      - "Entire home"
      - "Private room"
    amenities:
      - "WiFi"
      - "Kitchen"
    max_listings: 20
    enabled: true

  - name: "Bali Digital Nomad"
    location: "Bali, Indonesia"
    checkin: "2026-07-01"
    checkout: "2026-07-14"
    guests: 2
    min_price: 20
    max_price: 100
    property_types:
      - "Entire home"
    amenities:
      - "WiFi"
      - "Pool"
    max_listings: 15
    enabled: true

  - name: "Lisbon Explorer"
    location: "Lisbon, Portugal"
    checkin: "2026-08-10"
    checkout: "2026-08-17"
    guests: 2
    min_price: 40
    max_price: 120
    property_types:
      - "Entire home"
      - "Private room"
    amenities:
      - "WiFi"
    max_listings: 20
    enabled: false

# Outreach settings
outreach:
  # Delay between messages (seconds) to avoid spam
  delay_between_messages: 30
  # Max outreach per day
  max_per_day: 10
  # Auto follow-up after N days
  follow_up_after_days: 3
  # Max follow-ups per listing
  max_follow_ups: 2

# Scheduler
schedule:
  # Options: daily, weekly, monthly
  frequency: "weekly"
  day: "monday"
  time: "09:00"
